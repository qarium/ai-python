docs_dir: docs

site_name: ${TECH_WRITER_SITE_NAME:="project name from pyproject.toml [project.name]."}
site_description: ${TECH_WRITER_SITE_DESCRIPTION:="description from pyproject.toml [project.description]."}
site_url: ${TECH_WRITER_SITE_URL:="GitHub Pages URL, e.g. https://owner.github.io/package-name/. Derive from repo_url: replace github.com with owner.github.io, append package-name."}
repo_url: ${TECH_WRITER_REPO_URL:="Repository URL, e.g. https://github.com/owner/package-name. From git remote get-url or pyproject.toml [project.urls] Repository."}
edit_uri: edit/${DEVOPS_TRIGGER_BRANCH:="master. Determine from lead.md Config or git symbolic-ref."}/docs/

theme:
  name: material
  custom_dir: docs/overrides
  logo: https://avatars.githubusercontent.com/u/262344922?s=200&v=4
  palette:
    - scheme: default
      primary: custom
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
        media: "(prefers-color-scheme: light)"
    - scheme: slate
      primary: custom
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
        media: "(prefers-color-scheme: dark)"
  features:
    - navigation.tabs
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - API Reference: api-reference.md
  - Configuration: configuration.md
  - Examples: examples.md