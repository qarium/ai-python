name: Release docs
on:
  push:
    branches:
      - ${DEVOPS_TRIGGER_BRANCH:="master. Determine from lead.md Config or git symbolic-ref."}

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - name: Install dependencies
        run: |
          pip install -e ".[docs]"

      - name: Build and Deploy
        run: ${DEVOPS_DEPLOY_CMD:="mkdocs gh-deploy --force. Use deploy_cmd from tech-writer.md Config."}