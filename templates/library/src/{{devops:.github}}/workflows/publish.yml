name: Publish Release

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  release:
    uses: qarium/ci/.github/workflows/library-publish.yml@0.0.x
    with:
      src-package: '${DEVOPS_PACKAGE_SNAKE:="src. Package directory name in snake_case from pyproject.toml."}'
    secrets:
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
      ZAI_TOKEN: ${{ secrets.ZAI_TOKEN }}
