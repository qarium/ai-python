name: Tests
on:
  push:
    branches: [${DEVOPS_TRIGGER_BRANCH:="master. Determine from lead.md Config or git symbolic-ref."}]
  pull_request:
    branches: [${DEVOPS_TRIGGER_BRANCH:="master. Determine from lead.md Config or git symbolic-ref."}]

jobs:
  test:
    uses: qarium/ci/.github/workflows/library-tests.yml@0.0.x
    with:
      python-versions: '${DEVOPS_PYTHON_MATRIX:="derive from requires-python, e.g. >=3.10 → [\"3.10\", \"3.11\", \"3.12\", \"3.13\", \"3.14\"]"}'
